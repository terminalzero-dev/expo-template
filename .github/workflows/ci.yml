name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip installing git hooks in CI.
env:
  LEFTHOOK: "0"

jobs:
  check:
    name: Typecheck, lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck (type-aware)
        run: bun run typecheck

      - name: Format check
        run: bun run format:check
